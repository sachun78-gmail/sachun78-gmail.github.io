- id: 4
  title: "클로봇 박물관 큐레이팅 로봇"
  subtitle: "AOSP 기반 서비스 개발"
  period: "2022.05 ~ 2024.12"
  team: "6명"
  role: "PM / Android App 개발"
  tech_stack:
    - "Android Native(Kotlin), Gradle 멀티모듈(app + core-*)"
    - "UI: Jetpack Compose, Navigation Compose, Accompanist"
    - "DI/비동기: Hilt, Kotlin Coroutines/Flow"
    - "상태관리: 커스텀 Store<AppState>(단일 상태 + Mutex 기반 업데이트)"
    - "데이터: Room DB, Gson/Moshi"
    - "네트워크: Retrofit/OkHttp, MQTT(HiveMQ), FTP(commons-net), HTTP 파일 다운로드"
    - "AI/음성: Google Cloud TTS/STT/Translate"
    - "비전: ML Kit Face Detection + ONVIF 카메라 연동"
    - "로봇 SDK: LG Robot Platform AAR(RobotPlatform-guide-v1.6.22.00.aar)"
    - "테스트: JUnit, MockK, Robolectric, Espresso, Compose UI Test"
  overview: "박물관 안내 로봇용 Android 앱으로 전시/시설 안내, 도슨트 시나리오, 음성 챗봇, 원격관제(MQTT), 상태 모니터링을 통합한 현장형 서비스. Home/Launcher(MainActivity) 기반으로 다국어 UI/콘텐츠, 층별 동선, 배터리 스케줄 기반 자동 운용(도킹/언도킹/프로모트/도슨트) 로직을 포함하며 core-* 모듈로 로봇제어/챗봇/클라우드음성/DB/FTP/얼굴인식을 분리."
  architecture:
    - "구조 스타일: 기능 중심 멀티모듈 + 앱 오케스트레이션 계층"
    - "앱 진입: MainApplication(@HiltAndroidApp) -> MainActivity(@AndroidEntryPoint) -> Compose NavigationGraph/CentralNavHost"
    - "상태축: Store<AppState> 중심으로 ViewModel/Effect/Command가 상태를 읽고 갱신"
    - "이벤트축: Event(sealed class) -> EventDispatcher -> Command 객체 실행"
    - "로봇 제어축: core-cloi CloiRepository가 이동/도킹/비상/배터리/센서 이벤트를 Flow로 제공"
    - "통신축: core-mqtt 관제 명령 수신(/Agent{n}/#) + heartbeat/monitoring/log 발행"
    - "통신축: core-chatbot Retrofit 기반 질의/중단/재질의 큐 처리"
    - "통신축: core-gcp STT/TTS/번역 처리"
    - "데이터축: core-db Room(PageInfo, AdminInfo, ARContents)"
    - "데이터축: core-ftp 리소스/앱 업데이트 다운로드"
    - "운영 로직: MainViewModel + ScheduleChecker가 시간/배터리/층 정보 기반 자동 운행 시퀀스 제어"
  key_contributions:
    - "로봇 하드웨어 제어를 CloiRepository로 추상화해 UI/도메인과 분리"
    - "EventDispatcher + Command 패턴으로 복잡한 이동/도킹/전환 시퀀스를 일관되게 처리"
    - "MQTT 관제(원격주행/복귀/정지/발화)와 로봇 상태 텔레메트리(1초 모니터링, 8초 heartbeat) 통합"
    - "챗봇 질의 큐/재질의/브레이크 흐름과 다국어 STT-번역-질의 파이프라인 구현"
    - "박물관 현장 특화 기능(층별 경로, 도슨트/단체해설 스케줄, 장애 대응 화면, AR/콘텐츠 매핑) 내재화"
    - "운영 안정성 기능(크래시 로그 파일화/메일 전송, 네트워크 감지, 비상버튼/범퍼 이벤트 대응) 구현"

